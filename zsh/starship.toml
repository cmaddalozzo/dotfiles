# version: 1.0.0
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
continuation_prompt = "[‚Ėł‚ĖĻ ](dimmed white)"

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$custom\
$env_var\
$jobs\
$sudo\
$username\
$directory\
$character"""

right_format = """
$singularity\
$kubernetes\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cpp\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$fortran\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$maven\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$xmake\
$zig\
$buf\
$conda\
$pixi\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$status\
$os\
$battery\
$time"""

[fill]
symbol = ' '
disabled = true

[character]
format = " $symbol "
success_symbol = "[‚ĚĮ](bold fg:5)"
error_symbol = "[‚ĚĮ](bold 209)"
vimcmd_symbol = "[‚Ė†](bold fg:5)"
# not supported in zsh
vimcmd_replace_one_symbol = "‚óĆ"
vimcmd_replace_symbol = "‚Ė°"
vimcmd_visual_symbol = "‚Ėľ"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green'

[env_var.https_proxy]
format = "[‚áĄ]($style) "
style = "italic green"
disabled = true

[custom.proxy_dev]
when = ''' [[ "$https_proxy" == *:81* ]] '''
symbol = '‚áĄ'
format = "[$symbol]($style) "

[custom.proxy_tdmz]
when = ''' [[ "$https_proxy" == *tdmz* ]] '''
style = "italic 209"
symbol = '‚áĄ'
format = "[$symbol]($style) "

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
disabled = false

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
format = "[‚≠ė $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = "‚Ćā"
truncation_length = 2
truncation_symbol = ""
read_only = " ‚óą"
use_os_path_sep = true
style = "fg:5"
format = '[\[$path\]]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold fg:5'
repo_root_format = '[\[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path\]]($style)[$read_only]($read_only_style)'

[direnv]
disabled = false

[opa]
disabled = true

[cmd_duration]
format = "[‚óĄ $duration ](italic white)"

[time]
disabled = true

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "‚Ėą"
charging_symbol = "[‚ÜĎ](italic bold green)"
discharging_symbol = "‚Üď"
unknown_symbol = "‚ĖĎ"
empty_symbol = "‚ĖÉ"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[‚Ė≥](bold italic bright-blue)"
style = "italic bright-blue"
truncation_symbol = "‚čĮ"
truncation_length = 11
ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([‚Ėī$added]($added_style))([‚ĖŅ$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed red'
ignore_submodules = true
disabled = true

[git_status]
disabled = false
style = "bold italic bright-blue"
format = "([‚é™$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed‚é•]($style))"
conflicted = "[‚ó™](italic bright-magenta)"
ahead = "[‚Ėī‚Ēā[${count}](bold white)‚Ēā](italic green)"
behind = "[‚ĖŅ‚Ēā[${count}](bold white)‚Ēā](italic red)"
diverged = "[‚óá‚Ēā[${ahead_count}](regular white)‚Ēā‚ĖŅ‚Ē§[${behind_count}](regular white)‚Ēā](italic bright-magenta)"
untracked = "[‚óĆ](italic bright-yellow)"
stashed = "[‚óą](italic white)"
modified = "[‚óŹ](italic yellow)"
staged = "[‚Ė™‚Ē§[$count](bold white)‚Ēā](italic bright-cyan)"
renamed = "[‚óé](italic bright-blue)"
deleted = "[‚úē](italic red)"

[deno]
disabled = true

[lua]
disabled = true

[kubernetes]
disabled = true

[nodejs]
disabled = true

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
detect_extensions = []
detect_folders = []
detect_files = []

[aws]
disabled = true

[gcloud]
disabled = true

[golang]
disabled = true

[memory_usage]
symbol = "‚Ė™‚Ėę‚Ė™ "
format = " mem [${ram}( ${swap})]($style)"


[[claude_context.display]]
threshold = 0
hidden = false
